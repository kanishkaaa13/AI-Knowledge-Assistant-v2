services:
  - type: web
    name: ai-knowledge-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: CHROMA_PERSIST_DIRECTORY
        value: /opt/render/project/src/chroma_data
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: ENVIRONMENT
        value: production

databases:
  - name: ai-knowledge-db
    plan: free
